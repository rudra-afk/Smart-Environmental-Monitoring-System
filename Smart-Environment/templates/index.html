<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Everest Smart-system Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/static/app.js"></script>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="m-0">Everest  Dashboard</h3>
        <div class="d-flex gap-2">
            <button id="calBtn" class="btn btn-outline-primary btn-sm">Calibrate MQ135 (60s)</button>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-3"><div class="card"><div class="card-body">
            <div class="text-muted">Temp (AHT20)</div><div class="fs-4" id="tAht">--</div>
        </div></div></div>

        <div class="col-md-3"><div class="card"><div class="card-body">
            <div class="text-muted">Humidity</div><div class="fs-4" id="hum">--</div>
        </div></div></div>

        <div class="col-md-3"><div class="card"><div class="card-body">
            <div class="text-muted">Pressure</div><div class="fs-4" id="pres">--</div>
        </div></div></div>

        <div class="col-md-3"><div class="card"><div class="card-body">
            <div class="text-muted">eCO₂ (estimated)</div><div class="fs-4" id="eco2">--</div>
            <div class="text-muted small">IAQ: <span id="iaq">--</span></div>
        </div></div></div>
    </div>

    <div class="row g-3 mt-1">
        <div class="col-lg-6"><div class="card"><div class="card-body">
            <div class="fw-semibold mb-2">Temperature (°C)</div>
            <canvas id="tempChart"></canvas>
        </div></div></div>

        <div class="col-lg-6"><div class="card"><div class="card-body">
            <div class="fw-semibold mb-2">Humidity (%)</div>
            <canvas id="humChart"></canvas>
        </div></div></div>

        <div class="col-lg-6"><div class="card"><div class="card-body">
            <div class="fw-semibold mb-2">Pressure (hPa)</div>
            <canvas id="presChart"></canvas>
        </div></div></div>

        <div class="col-lg-6"><div class="card"><div class="card-body">
            <div class="fw-semibold mb-2">MQ135 Voltage / eCO₂</div>
            <canvas id="mqChart"></canvas>
        </div></div></div>
    </div>

    <p class="text-muted small mt-3 mb-0">
        Note: MQ135 gives an approximate eCO₂/IAQ estimate, not official AQI or true CO₂.
    </p>
</div>

<script src="/static/app.js"></script>
</body>
</html>
